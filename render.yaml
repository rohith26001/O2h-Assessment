services:
  # Unified Web Service (Backend + Frontend together)
  - type: web
    name: o2h-task-portal
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    rootDir: .
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
        placeholder: "Enter your MongoDB Atlas URI (e.g. mongodb+srv://...)"
      - key: JWT_SECRET
        generateValue: true
