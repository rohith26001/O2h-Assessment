services:
  # Backend Node.js Web Service
  - type: web
    name: o2h-task-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
        placeholder: "Enter your MongoDB Atlas URI (e.g. mongodb+srv://...)"
      - key: JWT_SECRET
        generateValue: true

  # Frontend React Static Site
  - type: web
    name: o2h-task-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          name: o2h-task-backend
          type: web
          property: host
